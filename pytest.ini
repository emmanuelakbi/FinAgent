[pytest]
# Use importlib import mode so test modules and conftest.py files in
# sibling directories (tests/, tools/tests/, inference/tests/,
# gradio-frontend/tests/) are discovered by their full filesystem path
# rather than by bare module name. Without this, pytest collides on
# common names like ``test_integration.py`` and ``conftest.py`` across
# unrelated directories. See:
# https://docs.pytest.org/en/stable/explanation/goodpractices.html#tests-outside-application-code
addopts = --import-mode=importlib

markers =
    integration: marks tests as integration tests requiring network access (deselect with '-m "not integration"')
